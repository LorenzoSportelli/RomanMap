<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collezione Numismatica</title>
<link rel="stylesheet" href="[unpkg.com](https://unpkg.com/leaflet@1.9.4/dist/leaflet.css)"/>
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap)" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #ffffff;
  --bg2:      #f7f7f5;
  --bg3:      #f0efec;
  --border:   #e2e0da;
  --border2:  #c8c5bc;
  --text:     #1a1a18;
  --text2:    #5a5850;
  --text3:    #9a9890;
  --accent:   #2a2a28;
  --red:      #c0392b;
  --panel:    290px;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; }
/* ── HEADER ── */
#hdr {
  height: 44px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 14px;
  position: relative;
  z-index: 1000;
}
#hdr-title {
  font-size: .72rem;
  font-weight: 500;
  letter-spacing: .12em;
  color: var(--text);
  text-transform: uppercase;
}
#hdr-sub { font-size: .65rem; color: var(--text3); margin-top: 1px; }
#hdr-sep { flex: 1; }
#hdr-count { font-size: .65rem; color: var(--text2); letter-spacing: .06em; }
#hdr-count span { color: var(--text); font-weight: 500; }
#btn-add {
  background: var(--text);
  border: none;
  color: var(--bg);
  font-family: 'Inter', sans-serif;
  font-size: .62rem;
  font-weight: 500;
  letter-spacing: .1em;
  padding: 5px 13px;
  cursor: pointer;
  text-transform: uppercase;
  transition: opacity .15s;
}
#btn-add:hover { opacity: .75; }
/* ── LAYOUT ── */
#body { display: flex; height: calc(100vh - 44px); }
#mapwrap { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }
#loading {
  position: absolute; inset: 0;
  background: #ffffffcc;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; z-index: 500;
}
#loading b { font-size: .72rem; font-weight: 500; letter-spacing: .1em; color: var(--text); }
#loading small { font-size: .65rem; color: var(--text3); }
/* ── TOOLTIP ── */
#tt {
  display: none;
  position: absolute;
  background: var(--bg);
  border: 1px solid var(--border2);
  padding: 9px 12px;
  z-index: 9999;
  pointer-events: none;
  min-width: 170px;
  box-shadow: 0 2px 12px rgba(0,0,0,.10);
}
#tt strong { display: block; font-size: .62rem; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--text); margin-bottom: 4px; }
#tt .tl { font-size: .8rem; color: var(--text2); }
#tt .tl b { color: var(--text); }
#tt .coins { margin-top: 5px; font-size: .7rem; color: var(--text3); border-top: 1px solid var(--border); padding-top: 4px; }
#tt .coin-item { padding: 1px 0; color: var(--text2); }
/* ── LEGEND ── */
#legend {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 900; background: var(--bg);
  border: 1px solid var(--border);
  padding: 5px 12px;
  display: flex; align-items: center; gap: 8px;
  font-size: .62rem; color: var(--text3);
  pointer-events: none; letter-spacing: .05em;
}
#legbar {
  width: 130px; height: 7px;
  background: linear-gradient(to right,
    #e8e8e4, #c8d4e0, #b8d0c8, #c8d8b0,
    #e0d890, #d8b858, #c89838, #b87828,
    #a05820, #884018, #703010, #582008
  );
}
/* ── PANEL ── */
#panel {
  width: var(--panel);
  background: var(--bg);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow: hidden;
}
#panel-head { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#panel-head h2 { font-size: .6rem; font-weight: 500; letter-spacing: .14em; color: var(--text2); text-transform: uppercase; margin-bottom: 8px; }
#srch {
  width: 100%; background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: .82rem; padding: 5px 8px; outline: none;
}
#srch:focus { border-color: var(--border2); }
#srch::placeholder { color: var(--text3); }
.filter-row { display: flex; gap: 3px; margin-top: 6px; }
.ftab {
  flex: 1; background: transparent;
  border: 1px solid var(--border); color: var(--text3);
  font-family: 'Inter', sans-serif; font-size: .58rem;
  font-weight: 500; letter-spacing: .08em; text-transform: uppercase;
  padding: 4px 6px; cursor: pointer; transition: all .12s;
}
.ftab.on { background: var(--text); border-color: var(--text); color: var(--bg); }
.ftab:hover:not(.on) { border-color: var(--border2); color: var(--text2); }
#clist { flex: 1; overflow-y: auto; }
#clist::-webkit-scrollbar { width: 3px; }
#clist::-webkit-scrollbar-thumb { background: var(--border2); }
.empty-msg { padding: 24px 14px; text-align: center; font-size: .8rem; color: var(--text3); }
.crow { padding: 9px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.crow:hover { background: var(--bg2); }
.crow-ref { font-size: .62rem; font-weight: 500; letter-spacing: .05em; color: var(--text); }
.crow-desc { font-size: .78rem; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.crow-meta { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.ctag { font-size: .55rem; padding: 1px 5px; border: 1px solid var(--border2); color: var(--text2); letter-spacing: .04em; text-transform: uppercase; }
.ct-rep { background: #f5f0e8; }
.ct-imp { background: #eef0f5; }
.ct-mat { background: var(--bg2); }
.ct-prov { background: #f0f5f0; }
.crow-actions { float: right; display: flex; gap: 3px; opacity: 0; transition: opacity .12s; }
.crow:hover .crow-actions { opacity: 1; }
.ca {
  width: 20px; height: 20px; background: transparent;
  border: 1px solid var(--border); color: var(--text3);
  cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.ca:hover { border-color: var(--border2); color: var(--text); }
.ca.del:hover { border-color: var(--red); color: var(--red); }
#foot {
  padding: 8px 14px; border-top: 1px solid var(--border);
  font-size: .6rem; font-weight: 500; letter-spacing: .08em;
  color: var(--text3); flex-shrink: 0; text-transform: uppercase;
}
#foot span { color: var(--text); }
/* ── MODAL ── */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.25); z-index: 2000;
  align-items: center; justify-content: center;
}
#overlay.open { display: flex; }
#modal {
  background: var(--bg); border: 1px solid var(--border2);
  width: 500px; max-width: 95vw; max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: 0 4px 40px rgba(0,0,0,.12);
}
#modal-head {
  padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
#modal-head h3 { font-size: .72rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; flex: 1; }
#modal-head button { background: transparent; border: none; color: var(--text3); font-size: 1.2rem; cursor: pointer; line-height: 1; }
#modal-head button:hover { color: var(--text); }
#modal-body { padding: 16px 18px; overflow-y: auto; flex: 1; }
#modal-body::-webkit-scrollbar { width: 3px; }
#modal-body::-webkit-scrollbar-thumb { background: var(--border2); }
#modal-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
.frow { margin-bottom: 12px; }
.frow label { display: block; font-size: .58rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--text2); margin-bottom: 5px; }
.frow label span { color: var(--text3); font-weight: 400; }
.frow input, .frow select, .frow textarea {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: .85rem; padding: 6px 9px; outline: none; resize: vertical;
}
.frow input:focus, .frow select:focus, .frow textarea:focus { border-color: var(--border2); }
.frow select option { background: var(--bg); color: var(--text); }
.fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.frow textarea { min-height: 56px; }
.fsep { height: 1px; background: var(--border); margin: 14px 0 12px; position: relative; }
.fsep-label {
  position: absolute; left: 50%; transform: translateX(-50%) translateY(-50%);
  background: var(--bg); padding: 0 10px;
  font-size: .55rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--text3);
}
.radio-group { display: flex; gap: 6px; }
.radio-opt {
  flex: 1; border: 1px solid var(--border); padding: 7px 10px;
  cursor: pointer; text-align: center;
  font-size: .62rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text3); transition: all .15s;
}
.radio-opt.on { border-color: var(--text); background: var(--text); color: var(--bg); }
.radio-opt:hover:not(.on) { border-color: var(--border2); color: var(--text2); }
.btn {
  background: transparent; border: 1px solid var(--border2);
  color: var(--text2); font-family: 'Inter', sans-serif;
  font-size: .62rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
  padding: 7px 16px; cursor: pointer; transition: all .15s;
}
.btn:hover { border-color: var(--text); color: var(--text); }
.btn-dark { background: var(--text); border-color: var(--text); color: var(--bg); }
.btn-dark:hover { opacity: .78; }
/* ── CONFIRM ── */
#confirm { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 3000; align-items: center; justify-content: center; }
#confirm.open { display: flex; }
#confirm-box { background: var(--bg); border: 1px solid var(--border2); padding: 24px 28px; text-align: center; max-width: 320px; box-shadow: 0 4px 24px rgba(0,0,0,.1); }
#confirm-box p { color: var(--text2); margin-bottom: 14px; font-size: .9rem; }
#confirm-box .btns { display: flex; gap: 8px; justify-content: center; }
/* ── MAP ── */
.leaflet-container { background: #eef0ee; }
.leaflet-control-zoom a { background: var(--bg) !important; color: var(--text) !important; border-color: var(--border2) !important; font-size: 14px !important; }
</style>
</head>
<body>
<div id="hdr">
  <div>
    <div id="hdr-title">Collezione Numismatica</div>
    <div id="hdr-sub">Impero Romano · Province al 117 d.C.</div>
  </div>
  <div id="hdr-sep"></div>
  <div id="hdr-count">Monete: <span id="hc">0</span></div>
  <button id="btn-add" onclick="openModal()">+ Aggiungi moneta</button>
</div>
<div id="body">
  <div id="mapwrap">
    <div id="map"></div>
    <div id="loading"><b>Caricamento mappa…</b><small>Province romane al 117 d.C.</small></div>
    <div id="tt"></div>
    <div id="legend"><span>0</span><div id="legbar"></div><span id="legmax">0</span></div>
  </div>
  <div id="panel">
    <div id="panel-head">
      <h2>Collezione</h2>
      <input id="srch" type="text" placeholder="Cerca…" oninput="renderList()">
      <div class="filter-row">
        <button class="ftab on" onclick="setFilter('all',this)">Tutto</button>
        <button class="ftab" onclick="setFilter('rep',this)">Rep.</button>
        <button class="ftab" onclick="setFilter('imp',this)">Imp.</button>
      </div>
    </div>
    <div id="clist"></div>
    <div id="foot">Monete: <span id="fcount">0</span></div>
  </div>
</div>
<!-- MODAL -->
<div id="overlay" onclick="if(event.target===this)closeModal()">
<div id="modal">
  <div id="modal-head">
    <h3 id="modal-title">Aggiungi moneta</h3>
    <button onclick="closeModal()">&#215;</button>
  </div>
  <div id="modal-body">
    <div class="frow">
      <label>Periodo</label>
      <div class="radio-group">
        <div class="radio-opt on" id="r-rep" onclick="setPeriod('rep')">Repubblicana</div>
        <div class="radio-opt"     id="r-imp" onclick="setPeriod('imp')">Imperiale</div>
      </div>
    </div>
    <div class="frow">
      <label>Riferimento <span>(es. RRC 44/5 · RPC I 985 · RIC 207)</span></label>
      <input id="f-ref" type="text" placeholder="RRC 44/5">
    </div>
    <div class="fgrid">
      <div class="frow">
        <label>Provincia / Regione</label>
        <select id="f-prov"></select>
      </div>
      <div class="frow">
        <label>Zecca</label>
        <input id="f-mint" type="text" placeholder="Roma, Lugdunum…">
      </div>
    </div>
    <div class="fsep"><div class="fsep-label">Emissione</div></div>
    <div id="block-rep">
      <div class="frow">
        <label>Magistrato / Tresviri</label>
        <input id="f-mag" type="text" placeholder="L. Aemilius Lepidus…">
      </div>
    </div>
    <div id="block-imp" style="display:none">
      <div class="fgrid">
        <div class="frow">
          <label>Imperatore / Autorità</label>
          <input id="f-imp" type="text" placeholder="Augusto, Traiano…">
        </div>
        <div class="frow">
          <label>Emessa da <span>(se diverso)</span></label>
          <input id="f-auth" type="text" placeholder="governatore…">
        </div>
      </div>
    </div>
    <div class="fsep"><div class="fsep-label">Caratteristiche</div></div>
    <div class="fgrid">
      <div class="frow">
        <label>Metallo</label>
        <select id="f-metal">
          <option value="">— seleziona —</option>
          <option>Oro (AV)</option>
          <option>Argento (AR)</option>
          <option>Bronzo (AE)</option>
          <option>Biglione</option>
          <option>Piombo</option>
          <option>Altro</option>
        </select>
      </div>
      <div class="frow">
        <label>Nominale</label>
        <input id="f-denom" type="text" placeholder="Denario, Sesterzio…">
      </div>
      <div class="frow" style="grid-column:1/-1">
        <label>Datazione</label>
        <input id="f-date" type="text" placeholder="es. 211–208 a.C.">
      </div>
    </div>
    <div class="frow">
      <label>Descrizione (dritto / rovescio)</label>
      <textarea id="f-desc" placeholder="Testa elmata di Roma / Dioscuri a cavallo…"></textarea>
    </div>
    <div class="frow">
      <label>Note</label>
      <textarea id="f-notes" placeholder="Conservazione, provenienza, acquisto…" style="min-height:44px"></textarea>
    </div>
  </div>
  <div id="modal-foot">
    <button class="btn" onclick="closeModal()">Annulla</button>
    <button class="btn btn-dark" onclick="saveCoin()">Salva moneta</button>
  </div>
</div>
</div>
<!-- CONFIRM DELETE -->
<div id="confirm">
<div id="confirm-box">
  <p>Eliminare questa moneta dalla collezione?</p>
  <div class="btns">
    <button class="btn" onclick="closeConfirm()">Annulla</button>
    <button class="btn" style="border-color:var(--red);color:var(--red)" onclick="doDelete()">Elimina</button>
  </div>
</div>
</div>
<script src="[unpkg.com](https://unpkg.com/leaflet@1.9.4/dist/leaflet.js)"></script>
<script>
// ── PROVINCE ────────────────────────────────────────────────
var PROVS = [
  "Italia",   // ← opzione generica (colora tutte le regioni italiane)
  "Achaia","Aegyptus","Alpes Cottiae","Alpes Graiae et Poeninae","Alpes Maritimae",
  "Aquitania","Arabia","Armenia Mesopotamia","Asia","Baetica","Belgica",
  "Bithynia et Pontus","Britannia","Cilicia","Creta et Cyrene","Dacia","Dalmatia",
  "Galatia et Cappadocia","Germania Inferior","Germania Superior","Iudaea",
  "Lugdunensis","Lusitania","Lycia et Pamphylia","Macedonia","Mauretania Caesariensis",
  "Mauretania Tingitana","Moesia Inferior","Moesia Superior","Narbonensis","Noricum",
  "Numidia","Pannonia Inferior","Pannonia Superior","Raetia","Sardinia et Corsica",
  "Sicilia","Syria","Tarraconensis","Thracia",
  "Italia — Regio I","Italia — Regio II","Italia — Regio III","Italia — Regio IV",
  "Italia — Regio V","Italia — Regio VI","Italia — Regio VII","Italia — Regio VIII",
  "Italia — Regio IX","Italia — Regio X","Italia — Regio XI"
];
var GEO_MAP = {
  "Achaia":"Achaia","Aegyptus":"Aegyptus","Alpes Cottiae":"Alpes Cottiae",
  "Alpes Graiae et Poeninae":"Alpes Graiae et Poeninae","Alpes Maritimae":"Alpes Maritimae",
  "Aquitania":"Aquitania","Arabia":"Arabia","Armenia":"Armenia Mesopotamia",
  "Mesopotamia":"Armenia Mesopotamia","Asia":"Asia","Baetica":"Baetica","Belgica":"Belgica",
  "Bithynia et Pontus":"Bithynia et Pontus","Britannia":"Britannia",
  "Cilicia":"Cilicia","Creta et Cyrenaica":"Creta et Cyrene","Cyrenaica":"Creta et Cyrene",
  "Dacia":"Dacia","Dalmatia":"Dalmatia","Galatia":"Galatia et Cappadocia",
  "Cappadocia":"Galatia et Cappadocia","Germania Inferior":"Germania Inferior",
  "Germania Superior":"Germania Superior","Iudaea":"Iudaea","Lugdunensis":"Lugdunensis",
  "Lusitania":"Lusitania","Lycia et Pamphylia":"Lycia et Pamphylia",
  "Macedonia":"Macedonia","Mauretania Caesariensis":"Mauretania Caesariensis",
  "Mauretania Tingitana":"Mauretania Tingitana","Moesia Inferior":"Moesia Inferior",
  "Moesia Superior":"Moesia Superior","Narbonensis":"Narbonensis","Noricum":"Noricum",
  "Numidia":"Numidia","Pannonia Inferior":"Pannonia Inferior",
  "Pannonia Superior":"Pannonia Superior","Raetia":"Raetia",
  "Sardinia et Corsica":"Sardinia et Corsica","Sicilia":"Sicilia","Syria":"Syria",
  "Tarraconensis":"Tarraconensis","Thracia":"Thracia","Italia":"Italia"
};
const STEPS = [
  [232,232,228],
  [200,212,224],
  [184,208,200],
  [200,216,176],
  [224,216,144],
  [216,184,88],
  [200,152,56],
  [184,120,40],
  [160,88,32],
  [136,64,24],
  [112,48,16],
  [88,32,8]
];
var coins = JSON.parse(localStorage.getItem('numismatica_v3') || '[]');
var nextId = parseInt(localStorage.getItem('numismatica_nid3') || '1');
var editId = null;
var deleteId = null;
var filterMode = 'all';
var currentPeriod = 'rep';
function save() {
  localStorage.setItem('numismatica_v3', JSON.stringify(coins));
  localStorage.setItem('numismatica_nid3', String(nextId));
}
// Popola select province
(function() {
  var sel = document.getElementById('f-prov');
  PROVS.forEach(function(p) {
    var o = document.createElement('option');
    o.value = p; o.textContent = p;
    sel.appendChild(o);
  });
})();
function val2color(v, mx) {
  if (!v || !mx) return "rgb(" + STEPS[0].join(",") + ")";
  var idx = Math.round((v / mx) * (STEPS.length - 1));
  idx = Math.max(0, Math.min(idx, STEPS.length - 1));
  if (idx === 0) idx = 1; // 0 riservato a "nessuna moneta"
  return "rgb(" + STEPS[idx].join(",") + ")";
}
function geoToOur(geoName) {
  if (!geoName) return null;
  if (GEO_MAP[geoName]) return GEO_MAP[geoName];
  var low = geoName.toLowerCase();
  for (var k in GEO_MAP) { if (k.toLowerCase() === low) return GEO_MAP[k]; }
  for (var k in GEO_MAP) { if (low.indexOf(k.toLowerCase()) >= 0) return GEO_MAP[k]; }
  return null;
}
// Conta monete per una provincia geografica.
// "Italia" (generica) e tutte le "Italia — Regio X" contano per qualsiasi layer italiano.
function provCount(ourName) {
  return coins.filter(function(c) {
    if (!c.prov) return false;
    if (ourName === "Italia") {
      // layer italia: conta monete assegnate a "Italia" generica O a qualsiasi Regio
      return c.prov === "Italia" || c.prov.startsWith("Italia —");
    }
    if (ourName.startsWith("Italia")) {
      // layer di una Regio specifica: conta quella Regio + le monete "Italia" generiche
      return c.prov === ourName || c.prov === "Italia";
    }
    return c.prov === ourName;
  }).length;
}
function getMax(gl) {
  var m = 0;
  gl.eachLayer(function(l) {
    var n = l.feature && l.feature.properties && l.feature.properties.name || "";
    var our = geoToOur(n);
    if (our) m = Math.max(m, provCount(our));
  });
  return m;
}
// ── MAPPA ────────────────────────────────────────────────────
var map = L.map("map", { center: [38, 18], zoom: 4, minZoom: 3, maxZoom: 8, attributionControl: false });
var tt = document.getElementById("tt");
var mw = document.getElementById("mapwrap");
var geoLayer = null;
fetch("[cdn.jsdelivr.net](https://cdn.jsdelivr.net/gh/klokantech/roman-empire@master/data/provinces.geojson)")
  .then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(function(data) {
    geoLayer = L.geoJSON(data, {
      style: function() {
        return { fillColor: "rgb(232,232,228)", fillOpacity: .85, color: "#a8a098", weight: .7 };
      },
      onEachFeature: function(feat, lyr) {
        var geoName = feat.properties && feat.properties.name || "";
        var ourName = geoToOur(geoName);
        lyr.on({
          mouseover: function(e) {
            lyr.setStyle({ weight: 1.5, color: "#555048", fillOpacity: .95 });
            lyr.bringToFront();
            var pc = ourName ? coins.filter(function(c) {
              if (!c.prov) return false;
              if (ourName === "Italia") return c.prov === "Italia" || c.prov.startsWith("Italia —");
              if (ourName.startsWith("Italia")) return c.prov === ourName || c.prov === "Italia";
              return c.prov === ourName;
            }) : [];
            var html = "<strong>" + (ourName || geoName) + "</strong>";
            html += "<div class='tl'>Monete: <b>" + pc.length + "</b></div>";
            if (pc.length) {
              html += "<div class='coins'>";
              pc.slice(0, 4).forEach(function(c) {
                var label = c.ref || (c.period === 'rep' ? c.mag : c.imp) || c.denom || '—';
                html += "<div class='coin-item'>" + label + (c.denom && c.ref ? " · " + c.denom : "") + "</div>";
              });
              if (pc.length > 4) html += "<div class='coin-item'>…e altre " + (pc.length - 4) + "</div>";
              html += "</div>";
            }
            tt.innerHTML = html;
            tt.style.display = "block";
            postt(e.originalEvent);
          },
          mousemove: function(e) { postt(e.originalEvent); },
          mouseout: function() { tt.style.display = "none"; updateMap(); }
        });
      }
    }).addTo(map);
    document.getElementById("loading").style.display = "none";
    updateMap();
  })
  .catch(function(e) {
    document.getElementById("loading").innerHTML = "<b style='color:var(--red)'>Errore: " + e.message + "</b>";
  });
function postt(e) {
  var r = mw.getBoundingClientRect();
  var x = e.clientX - r.left + 14, y = e.clientY - r.top - 8;
  if (x + 210 > mw.offsetWidth)  x = e.clientX - r.left - 215;
  if (y + 120 > mw.offsetHeight) y = e.clientY - r.top - 120;
  tt.style.left = x + "px"; tt.style.top = y + "px";
}
function updateMap() {
  if (!geoLayer) return;
  var mx = getMax(geoLayer);
  document.getElementById("legmax").textContent = mx;
  geoLayer.eachLayer(function(l) {
    var n = l.feature && l.feature.properties && l.feature.properties.name || "";
    var our = geoToOur(n);
    var v = our ? provCount(our) : 0;
    l.setStyle({
      fillColor: val2color(v, mx),
      fillOpacity: .85,
      color: "#a8a098",
      weight: .7
    });
  });
}
// ── MODAL ────────────────────────────────────────────────────
function setPeriod(p) {
  currentPeriod = p;
  document.getElementById('r-rep').className = 'radio-opt' + (p === 'rep' ? ' on' : '');
  document.getElementById('r-imp').className = 'radio-opt' + (p === 'imp' ? ' on' : '');
  document.getElementById('block-rep').style.display = p === 'rep' ? '' : 'none';
  document.getElementById('block-imp').style.display = p === 'imp' ? '' : 'none';
}
function openModal(id) {
  editId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Modifica moneta' : 'Aggiungi moneta';
  ['f-ref','f-mint','f-mag','f-imp','f-auth','f-denom','f-date','f-desc','f-notes'].forEach(function(i) {
    document.getElementById(i).value = '';
  });
  document.getElementById('f-metal').value = '';
  document.getElementById('f-prov').value = PROVS[0];
  setPeriod('rep');
  if (id) {
    var c = coins.find(function(x) { return x.id === id; });
    if (c) {
      setPeriod(c.period);
      ['ref','mint','mag','imp','auth','metal','denom','date','desc','notes'].forEach(function(k) {
        var el = document.getElementById('f-' + k);
        if (el) el.value = c[k] || '';
      });
      document.getElementById('f-prov').value = c.prov || PROVS[0];
    }
  }
  document.getElementById('overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editId = null;
}
function saveCoin() {
  var prov = document.getElementById('f-prov').value;
  if (!prov) { document.getElementById('f-prov').focus(); return; }
  var coin = {
    id:     editId || nextId++,
    period: currentPeriod,
    ref:    document.getElementById('f-ref').value.trim(),
    prov:   prov,
    mint:   document.getElementById('f-mint').value.trim(),
    mag:    document.getElementById('f-mag').value.trim(),
    imp:    document.getElementById('f-imp').value.trim(),
    auth:   document.getElementById('f-auth').value.trim(),
    metal:  document.getElementById('f-metal').value,
    denom:  document.getElementById('f-denom').value.trim(),
    date:   document.getElementById('f-date').value.trim(),
    desc:   document.getElementById('f-desc').value.trim(),
    notes:  document.getElementById('f-notes').value.trim(),
  };
  if (editId) {
    var idx = coins.findIndex(function(x) { return x.id === editId; });
    if (idx >= 0) coins[idx] = coin;
  } else {
    coins.push(coin);
  }
  save(); closeModal(); renderList(); updateMap(); updateHeaderCount();
}
// ── DELETE ───────────────────────────────────────────────────
function askDelete(id, e) {
  e.stopPropagation(); deleteId = id;
  document.getElementById('confirm').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm').classList.remove('open'); deleteId = null; }
function doDelete() {
  coins = coins.filter(function(c) { return c.id !== deleteId; });
  save(); closeConfirm(); renderList(); updateMap(); updateHeaderCount();
}
// ── LIST ─────────────────────────────────────────────────────
function setFilter(f, el) {
  filterMode = f;
  document.querySelectorAll('.ftab').forEach(function(t) { t.classList.remove('on'); });
  el.classList.add('on');
  renderList();
}
function renderList() {
  var q = document.getElementById('srch').value.toLowerCase();
  var filtered = coins.filter(function(c) {
    if (filterMode === 'rep' && c.period !== 'rep') return false;
    if (filterMode === 'imp' && c.period !== 'imp') return false;
    if (!q) return true;
    return (c.ref + c.prov + c.desc + c.mag + c.imp + c.denom + c.mint).toLowerCase().indexOf(q) >= 0;
  });
  var el = document.getElementById('clist');
  el.innerHTML = '';
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-msg">Nessuna moneta' + (q ? ' trovata' : '') + '.</div>';
    document.getElementById('fcount').textContent = '0';
    return;
  }
  filtered.forEach(function(c) {
    var d = document.createElement('div');
    d.className = 'crow';
    var who = c.period === 'rep' ? c.mag : (c.imp || c.auth || '');
    var tags = '<span class="ctag ' + (c.period === 'rep' ? 'ct-rep' : 'ct-imp') + '">' + (c.period === 'rep' ? 'Rep' : 'Imp') + '</span>';
    if (c.metal) tags += '<span class="ctag ct-mat">' + c.metal.split(' ')[0] + '</span>';
    if (c.denom) tags += '<span class="ctag ct-mat">' + c.denom + '</span>';
    if (c.prov)  tags += '<span class="ctag ct-prov">' + c.prov.replace('Italia — ', '') + '</span>';
    var refLine = c.ref || '(senza riferimento)';
    d.innerHTML =
      '<div style="display:flex;align-items:flex-start;gap:4px">' +
        '<div style="flex:1;min-width:0">' +
          '<div class="crow-ref">' + refLine + '</div>' +
          (who  ? '<div class="crow-desc">' + who + '</div>' : '') +
          (c.desc ? '<div class="crow-desc" style="font-style:italic">' + c.desc + '</div>' : '') +
          '<div class="crow-meta">' + tags + '</div>' +
        '</div>' +
        '<div class="crow-actions">' +
          '<button class="ca" title="Modifica" onclick="openModal(' + c.id + ')">&#9998;</button>' +
          '<button class="ca del" title="Elimina" onclick="askDelete(' + c.id + ',event)">&#x2715;</button>' +
        '</div>' +
      '</div>';
    el.appendChild(d);
  });
  document.getElementById('fcount').textContent = filtered.length;
}
function updateHeaderCount() {
  document.getElementById('hc').textContent = coins.length;
}
renderList();
updateHeaderCount();
</script>
</body>
</html>
