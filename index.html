<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Empire — Numismatic Collection</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#1a1a1a;--gold-dim:#555555;--gold-pale:#222222;
  --bg:#f9f8f6;--bg2:#ffffff;--bg3:#f2f1ef;
  --border:#d8d5cf;--border2:#b0aca4;
  --text:#1a1a1a;--text2:#555550;--text3:#999990;
  --red:#c0392b;--panel:300px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif

#hdr{height:48px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:relative;z-index:1000}
#hdr-title{font-family:'Inter', sans-serif;;font-size:.85rem;color:var(--text);letter-spacing:.15em;font-weight:500}
#hdr-sub{font-size:.72rem;color:var(--text3);font-style:italic}
#hdr-sep{flex:1}
#hdr-count{font-size:.72rem;color:var(--text2);font-family:'Inter', sans-serif;;letter-spacing:.08em}
#hdr-count span{color:var(--text)}
#btn-add{background:transparent;border:1px solid var(--border2);color:var(--text);font-family:'Inter', sans-serif;;font-size:.65rem;letter-spacing:.1em;padding:5px 14px;cursor:pointer;transition:all .2s}
#btn-add:hover{background:var(--text);color:var(--bg2)}

#body{display:flex;height:calc(100vh - 48px)}
#mapwrap{flex:1;position:relative}
#map{width:100%;height:100%}

#loading{position:absolute;inset:0;background:#f9f8f6ee;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:500}
#loading b{color:var(--text);letter-spacing:.1em;font-weight:400;font-family:'Inter', sans-serif;}
#loading small{color:var(--text3);font-style:italic;font-size:.75rem}

#tt{display:none;position:absolute;background:var(--bg2);border:1px solid var(--border2);padding:9px 13px;z-index:9999;pointer-events:none;min-width:180px;box-shadow:0 4px 20px #00000022}
#tt strong{display:block;font-family:'Inter', sans-serif;;color:var(--text);font-size:.64rem;letter-spacing:.08em;margin-bottom:5px;font-weight:500}
#tt .tl{font-size:.82rem;color:var(--text2)}
#tt .tl b{color:var(--text)}
#tt .coins{margin-top:5px;font-size:.72rem;color:var(--text3);font-style:italic;border-top:1px solid var(--border);padding-top:4px}
#tt .coin-item{color:var(--text2);padding:1px 0}

#legend{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:900;background:#f9f8f6cc;border:1px solid var(--border);padding:5px 14px;display:flex;align-items:center;gap:8px;font-size:.7rem;color:var(--text2);pointer-events:none;font-family:'Inter', sans-serif;;letter-spacing:.05em}
#legbar{
  width:150px;
  height:9px;
  border-radius:1px;
  background:linear-gradient(
    to right,
    rgb(207,207,207),
    rgb(121,160,211),
    rgb(128,172,160),
    rgb(171,197,132),
    rgb(236,213,120),
    rgb(239,201,96),
    rgb(243,184,75),
    rgb(242,171,61),
    rgb(241,157,52),
    rgb(238,143,46),
    rgb(234,127,41),
    rgb(229,111,38),
    rgb(223,96,35),
    rgb(218,79,31),
    rgb(214,61,28),
    rgb(211,44,25)
  );
}

#panel{width:var(--panel);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#panel-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
#panel-head h2{font-family:'Inter', sans-serif;;font-size:.65rem;color:var(--text);letter-spacing:.12em;font-weight:500;margin-bottom:8px}
#srch{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Crimson Text',serif;font-size:.9rem;padding:4px 8px;outline:none}
#srch:focus{border-color:var(--border2)}
#srch::placeholder{color:var(--text3)}
.filter-row{display:flex;gap:4px;margin-top:6px}
.ftab{flex:1;background:transparent;border:1px solid var(--border);color:var(--text3);font-family:'Inter', sans-serif;;font-size:.58rem;letter-spacing:.08em;padding:3px 6px;cursor:pointer;transition:all .15s}
.ftab.on{background:var(--text);border-color:var(--text);color:var(--bg2)}
.ftab:hover:not(.on){border-color:var(--border2);color:var(--text2)}

#clist{flex:1;overflow-y:auto}
#clist::-webkit-scrollbar{width:3px}
#clist::-webkit-scrollbar-thumb{background:var(--border)}
.empty-msg{padding:24px 14px;text-align:center;font-style:italic;color:var(--text3);font-size:.82rem}

.crow{padding:12px 16px;border-bottom:1px solid #00000008;cursor:pointer;transition:background .1s}
.crow:hover{background:#00000005}
.crow-ref{
  font-family:'Inter', sans-serif;
  font-size:.85rem;
  font-weight:600;
  letter-spacing:.02em;
}
.crow-desc{
  font-size:.95rem;
  color:var(--text2);
  margin-top:3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.crow-meta{
  display:flex;
  gap:8px;
  margin-top:6px;
  flex-wrap:wrap;
}

.ctag{
  font-size:.78rem;
  padding:4px 9px;
  border:1px solid;
  letter-spacing:.03em;
  border-radius:3px;
}

.ct-rep{
  color:#6bbcff;
  border-color:#6bbcff33;
  background:#e8f4ff;
}

.ct-imp{
  color:#b28cff;
  border-color:#b28cff33;
  background:#f3eeff;
}

.ct-prov{
  color:#ffb25c;
  border-color:#ffb25c33;
  background:#fff5e8;
}

.ct-prov-name{
  color:#2a7a4a;
  border:1px solid #2a7a4a33;
  background:#eaf5ee;
}

.ct-mat{color:#706050;border-color:#70605033;background:#f5f2ee}
.crow-actions{float:right;display:flex;gap:3px;opacity:0;transition:opacity .15s}
.crow:hover .crow-actions{opacity:1}
.ca{width:18px;height:18px;background:transparent;border:1px solid var(--border);color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.ca:hover{border-color:var(--border2);color:var(--text)}
.ca.del:hover{border-color:var(--red);color:#c0392b}

#foot{padding:7px 14px;border-top:1px solid var(--border);font-family:'Inter', sans-serif;;font-size:.62rem;color:var(--text3);flex-shrink:0;display:flex;gap:16px;letter-spacing:.06em}
#foot span{color:var(--text)}

#overlay{display:none;position:fixed;inset:0;background:#00000044;z-index:2000;align-items:center;justify-content:center}
#overlay.open{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border2);width:520px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 60px #00000022}
#modal-head{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
#modal-head h3{font-family:'Inter', sans-serif;;font-size:.8rem;color:var(--text);letter-spacing:.12em;font-weight:500;flex:1}
#modal-head button{background:transparent;border:none;color:var(--text3);font-size:1.2rem;cursor:pointer;line-height:1}
#modal-head button:hover{color:var(--text)}
#modal-body{padding:16px 18px;overflow-y:auto;flex:1}
#modal-body::-webkit-scrollbar{width:3px}
#modal-body::-webkit-scrollbar-thumb{background:var(--border)}
#modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

.frow{margin-bottom:13px}
.frow label{display:block;font-family:'Inter', sans-serif;;font-size:.6rem;color:var(--text3);letter-spacing:.1em;margin-bottom:5px}
.frow label span{color:var(--border2)}
.frow input,.frow select,.frow textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Crimson Text',serif;font-size:.95rem;padding:5px 9px;outline:none;resize:vertical}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--border2)}
.frow select option{background:var(--bg2);color:var(--text)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow textarea{min-height:60px}
.fsep{height:1px;background:var(--border);margin:16px 0 14px;position:relative}
.fsep-label{position:absolute;left:50%;transform:translateX(-50%) translateY(-50%);background:var(--bg2);padding:0 10px;font-family:'Inter', sans-serif;;font-size:.58rem;color:var(--text3);letter-spacing:.1em}
.radio-group{display:flex;gap:8px}
.radio-opt{flex:1;border:1px solid var(--border);padding:7px 10px;cursor:pointer;text-align:center;font-family:'Inter', sans-serif;;font-size:.65rem;letter-spacing:.08em;color:var(--text3);transition:all .2s}
.radio-opt.on{border-color:var(--text);background:var(--bg3);color:var(--text)}
.radio-opt:hover:not(.on){border-color:var(--border2);color:var(--text2)}

.btn{background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:'Inter', sans-serif;;font-size:.65rem;letter-spacing:.1em;padding:7px 18px;cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--text);color:var(--text)}
.btn-gold{background:var(--text);border-color:var(--text);color:var(--bg2)}
.btn-gold:hover{background:#333333;color:var(--bg2);border-color:#333333}

#confirm{display:none;position:fixed;inset:0;background:#00000066;z-index:3000;align-items:center;justify-content:center}
#confirm.open{display:flex}
#confirm-box{background:var(--bg2);border:1px solid var(--border2);padding:24px 28px;text-align:center;max-width:340px}
#confirm-box p{font-style:italic;color:var(--text2);margin-bottom:14px;font-size:.95rem}
#confirm-box .btns{display:flex;gap:8px;justify-content:center}

.leaflet-container{background:#e8e8e0}
.leaflet-control-zoom a{background:var(--bg2)!important;color:var(--text)!important;border-color:var(--border)!important}

.leaflet-control-attribution {
  font-size: 7px !important;
  line-height: 1.1 !important;
  opacity: 0.65 !important;
  background: rgba(249,248,246,0.55) !important;
  color: #333333 !important;
  border: 1px solid #d8d5cf !important;
  padding: 2px 5px !important;
  border-radius: 3px;
  transform-origin: bottom right;
}

#hdr{
  height:80px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 20px;
  position:relative;
}

#hdr-left{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  display:flex;
  flex-direction:column;
  gap:2px;
  margin-top:18px;
}

#hdr-title{
  font-family:'Inter', sans-serif;
  font-size:1.05rem;
  letter-spacing:.12em;
  font-weight:600;
}

#hdr-title{
  font-family:'Inter', sans-serif;
  font-size:1.05rem;
  letter-spacing:.12em;
  font-weight:600;
}

#hdr-right{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:12px;
}
  
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-left">
    <div id="hdr-title">ROMAN EMPIRE · NUMISMATIC COLLECTION</div>
    <div id="hdr-sub">Provinces at 117 AD</div>
  </div>

  <div id="hdr-sep"></div>

  <div id="hdr-right">
    <div id="hdr-count">Coins: <span id="hc">0</span></div>
    <button id="btn-add" onclick="openModal()">+ ADD COIN</button>
  </div>
</div>

<div id="body">
  <div id="mapwrap">
    <div id="map"></div>
    <div id="loading"><b>Loading map…</b><small>Roman provinces at 117 AD</small></div>
    <div id="tt"></div>
    <div id="legend"><span>0</span><div id="legbar"></div><span id="legmax">0</span></div>
  </div>

  <div id="panel">
    <div id="panel-head">
      <h2>COLLECTION</h2>
      <input id="srch" type="text" placeholder="Search…" oninput="renderList()">
      <div class="filter-row">
        <button class="ftab on" onclick="setFilter('all',this)">All</button>
        <button class="ftab" onclick="setFilter('rep',this)">Republican</button>
        <button class="ftab" onclick="setFilter('imp',this)">Imperial</button>
        <button class="ftab" onclick="setFilter('prov',this)">Provincial</button>
      </div>
    </div>
    <div id="clist"></div>
    <div id="foot">Coins: <span id="fcount">0</span></div>
  </div>
</div>

<!-- ADD COIN MODAL -->
<div id="overlay" onclick="if(event.target===this)closeModal()">
<div id="modal">
  <div id="modal-head">
    <h3 id="modal-title">ADD COIN</h3>
    <button onclick="closeModal()">&#215;</button>
  </div>
  <div id="modal-body">

    <div class="frow">
      <label>PERIOD</label>
      <div class="radio-group">
        <div class="radio-opt on" id="r-rep" onclick="setPeriod('rep')">REPUBLICAN</div>
        <div class="radio-opt" id="r-imp" onclick="setPeriod('imp')">IMPERIAL</div>
        <div class="radio-opt" id="r-prov" onclick="setPeriod('prov')">PROVINCIAL</div>
      </div>
    </div>

    <div class="frow">
      <label>REFERENCE <span style="font-size:.55rem;letter-spacing:.05em;color:var(--text3)">(e.g. RRC 44/5 · RPC I 985 · RIC 207)</span></label>
      <input id="f-ref" type="text" placeholder="RRC 44/5">
    </div>

    <div class="fgrid">
      <div class="frow">
        <label>PROVINCE / REGION <span>*</span></label>
        <select id="f-prov"></select>
      </div>
      <div class="frow">
        <label>MINT</label>
        <input id="f-mint" type="text" placeholder="Roma, Lugdunum…">
      </div>
    </div>

    <div class="fsep"><div class="fsep-label">ISSUE</div></div>

    <div id="block-rep">
      <div class="frow">
        <label>MAGISTRATE / TRESVIRI</label>
        <input id="f-mag" type="text" placeholder="L. Aemilius Lepidus, M. Furius Philus…">
      </div>
    </div>

    <div id="block-imp" style="display:none">
      <div class="fgrid">
        <div class="frow">
          <label>EMPEROR / AUTHORITY</label>
          <input id="f-imp" type="text" placeholder="Augustus, Trajan…">
        </div>
        <div class="frow">
          <label>ISSUED BY <span style="font-size:.5rem">(if different)</span></label>
          <input id="f-auth" type="text" placeholder="general, governor…">
        </div>
      </div>
    </div>

    <div id="block-prov" style="display:none">
      <div class="frow">
        <label>PROVINCIAL AUTHORITY / ISSUER</label>
        <input id="f-prov-auth" type="text" placeholder="Governor, city, local magistrate…">
      </div>
    </div>

    <div class="fsep"><div class="fsep-label">CHARACTERISTICS</div></div>

    <div class="fgrid">
      <div class="frow">
        <label>METAL</label>
        <select id="f-metal">
          <option value="">— select —</option>
          <option>Oro (AV)</option>
          <option>Argento (AR)</option>
          <option>Bronzo (AE)</option>
          <option>Biglione</option>
          <option>Piombo</option>
          <option>Altro</option>
        </select>
      </div>
      <div class="frow">
        <label>DENOMINATION</label>
        <input id="f-denom" type="text" placeholder="Denarius, Sestertius, As…">
      </div>
      <div class="frow" style="grid-column:1/-1">
        <label>PERIOD / DATE</label>
        <input id="f-date" type="text" placeholder="e.g. 211–208 BC">
      </div>
    </div>

    <div class="frow">
      <label>DESCRIPTION (obverse / reverse)</label>
      <textarea id="f-desc" placeholder="Helmeted head of Roma / Dioscuri on horseback…"></textarea>
    </div>
    <div class="frow">
      <label>NOTES</label>
      <textarea id="f-notes" placeholder="Condition, provenance, purchase…" style="min-height:48px"></textarea>
    </div>

  </div>
  <div id="modal-foot">
    <button class="btn" onclick="closeModal()">CANCEL</button>
    <button class="btn btn-gold" onclick="saveCoin()">SAVE COIN</button>
  </div>
</div>
</div>

<!-- DELETE CONFIRMATION -->
<div id="confirm">
<div id="confirm-box">
  <p>Remove this coin from the collection?</p>
  <div class="btns">
    <button class="btn" onclick="closeConfirm()">CANCEL</button>
    <button class="btn" style="border-color:var(--red);color:#c0392b" onclick="doDelete()">DELETE</button>
  </div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var PROVS = [
  "Achaia",
  "Aegyptus",
  "Alpes Cottiae",
  "Alpes Graiae et Poeninae",
  "Alpes Maritimae",
  "Aquitania",

  "Italia — Regio II — Apulia et Calabria",
  "Italia — Regio III — Lucania et Bruttii",
  "Italia — Regio IV — Samnium",
  "Italia — Regio V — Picenum",
  "Italia — Regio VI — Umbria et Ager Gallicus",
  "Italia — Regio VII — Etruria",
  "Italia — Regio VIII — Aemilia",
  "Italia — Regio IX — Liguria",
  "Italia — Regio X — Venetia et Histria",
  "Italia — Regio XI — Transpadana",
];

var GEO_MAP = {
  "Achaia":"Achaia",
  "Aegyptus":"Aegyptus",
  "Alpes Cottiae":"Alpes Cottiae",
  "Alpes Graiae et Poeninae":"Alpes Graiae et Poeninae",
  "Alpes Maritimae":"Alpes Maritimae",
  "Aquitania":"Aquitania",
  "Arabia":"Arabia",

  "Lugdunensis":"Lugdunensis",

  "Moesia Inferior":"Moesia Inferior",

  "Narbonensis":"Narbonensis",
  "Noricum":"Noricum",

  "Pannonia Inferior":"Pannonia Inferior",
  "Pannonia Superior":"Pannonia Superior",
  "Raetia":"Raetia",

  "Thracia":"Thracia",
  "Italia":"Italia",
  "I":"Italia — Regio I — Latium et Campania",
  "II":"Italia — Regio II — Apulia et Calabria",
  "III":"Italia — Regio III — Lucania et Bruttii",
  "IV":"Italia — Regio IV — Samnium",
  "V":"Italia — Regio V — Picenum",
  "VI":"Italia — Regio VI — Umbria et Ager Gallicus",
  "VII":"Italia — Regio VII — Etruria",
  "VIII":"Italia — Regio VIII — Aemilia",
  "IX":"Italia — Regio IX — Liguria",
  "X":"Italia — Regio X — Venetia et Histria",
  "XI":"Italia — Regio XI — Transpadana"
};

const STEPS = [
  [207,207,207],
  [121,160,211],
  [128,172,160],
  [171,197,132],
  [236,213,120],
  [239,201,96],
  [243,184,75],
  [242,171,61],
  [241,157,52],
  [238,143,46],
  [234,127,41],
  [229,111,38],
  [223,96,35],
  [218,79,31],
  [214,61,28],
  [211,44,25]
];

var coins = JSON.parse(localStorage.getItem('numismatica_v2') || '[]');
var nextId = parseInt(localStorage.getItem('numismatica_nid') || '1');
var editId = null;
var deleteId = null;
var filterMode = 'all';
var currentPeriod = 'rep';

function save(){
  localStorage.setItem('numismatica_v2', JSON.stringify(coins));
  localStorage.setItem('numismatica_nid', String(nextId));
}

(function(){
  var sel = document.getElementById('f-prov');
  PROVS.forEach(function(p){
    var o = document.createElement('option');
    o.value = p; o.textContent = p; sel.appendChild(o);
  });
})();

function val2color(v, mx) {

  if (!v || !mx)
    return "rgb(" + STEPS[0].join(",") + ")";

  var idx = Math.ceil((v / mx) * (STEPS.length - 1));

  idx = Math.max(1, Math.min(idx, STEPS.length - 1));

  return "rgb(" + STEPS[idx].join(",") + ")";
}

function geoToOur(geoName){
  if(!geoName)return null;
  if(GEO_MAP[geoName])return GEO_MAP[geoName];
  var low=geoName.toLowerCase();
  for(var k in GEO_MAP){if(k.toLowerCase()===low)return GEO_MAP[k];}
  for(var k in GEO_MAP){if(low.indexOf(k.toLowerCase())>=0)return GEO_MAP[k];}
  return null;
}

function provCount(ourName){

  return coins.filter(function(c){

    if(c.prov === "Italia"){
      return ourName &&
             (ourName === "Italia" ||
              ourName.indexOf("Italia") === 0);
    }

    if(ourName === "Italia"){
      return c.prov &&
             c.prov.indexOf("Italia") === 0;
    }

    return c.prov === ourName;

  }).length;
}

function getMax(gl){
  var m=0;
  gl.eachLayer(function(l){
    var n=l.feature&&l.feature.properties&&l.feature.properties.name||"";
    var our=geoToOur(n);
    if(our)m=Math.max(m,provCount(our));
  });
  return m;
}

var map = L.map("map", {
  // center: [38, 18],
  zoom: 4.85,        // <-- base
  minZoom: 4.85,     // <-- NON puoi andare più fuori di questo
  maxZoom: 8,
  zoomSnap: 0.1,    // <-- permette zoom non interi (fondamentale)
  zoomDelta: 0.5
});
  
var tt=document.getElementById("tt");
var mw=document.getElementById("mapwrap");
var geoLayer=null;

fetch("https://cdn.jsdelivr.net/gh/klokantech/roman-empire@master/data/provinces.geojson")
  .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(function(data){
    geoLayer=L.geoJSON(data,{
      style:function(){return{fillColor:"#c8c8b3",fillOpacity:.83,color:"#6a5020",weight:.8};},
      onEachFeature:function(feat,lyr){
        var geoName=feat.properties&&feat.properties.name||"";
        var ourName=geoToOur(geoName);
        lyr.on({
          mouseover:function(e){
            lyr.setStyle({weight:2,color:"#e8c020",fillOpacity:.95});
            lyr.bringToFront();
            
            var pc = ourName ? coins.filter(function(c){
            
              if(c.prov === "Italia"){
                return ourName === "Italia" ||
                       ourName.startsWith("Italia");
              }
            
              if(ourName === "Italia"){
                return c.prov && c.prov.startsWith("Italia");
              }
            
              return c.prov === ourName;
            
            }) : [];
            
            var html="<strong>"+(ourName||geoName)+"</strong>";
            html+="<div class='tl'>Coins: <b>"+pc.length+"</b></div>";
            if(pc.length){
              html+="<div class='coins'>";
              pc.slice(0,4).forEach(function(c){
                var label=c.ref||(c.period==='rep'?c.mag:c.imp)||c.denom||'—';
                html+="<div class='coin-item'>"+label+(c.denom&&c.ref?" · "+c.denom:"")+"</div>";
              });
              if(pc.length>4)html+="<div class='coin-item'>…and "+(pc.length-4)+" more</div>";
              html+="</div>";
            }
            tt.innerHTML=html;
            tt.style.display="block";
            postt(e.originalEvent);
          },
          mousemove:function(e){postt(e.originalEvent);},
          mouseout:function(){tt.style.display="none";updateMap();}
        });
      }
    }).addTo(map);

    var b = geoLayer.getBounds();
    
    map.fitBounds(b, {
      padding: [20, 20]
    });
    
    map.setMaxBounds(b);
    map.options.maxBoundsViscosity = 1.0;
    
    document.getElementById("loading").style.display="none";
    updateMap();
  })
  .catch(function(e){
    document.getElementById("loading").innerHTML="<b style='color:#c0392b'>Error: "+e.message+"</b>";
  });

function postt(e){
  var r=mw.getBoundingClientRect();
  var x=e.clientX-r.left+14,y=e.clientY-r.top-8;
  if(x+200>mw.offsetWidth)x=e.clientX-r.left-205;
  if(y+110>mw.offsetHeight)y=e.clientY-r.top-110;
  tt.style.left=x+"px";tt.style.top=y+"px";
}

function updateMap(){
  if(!geoLayer)return;
  var mx=getMax(geoLayer);
  document.getElementById("legmax").textContent=mx;
  geoLayer.eachLayer(function(l){
    var n=l.feature&&l.feature.properties&&l.feature.properties.name||"";
    var our=geoToOur(n);
    var v=our?provCount(our):0;
    l.setStyle({fillColor:val2color(v,mx),fillOpacity:.83,color:"#6a5020",weight:.8});
  });
}

function setPeriod(p){
  currentPeriod=p;

  document.getElementById('r-rep').className='radio-opt'+(p==='rep'?' on':'');
  document.getElementById('r-imp').className='radio-opt'+(p==='imp'?' on':'');
  document.getElementById('r-prov').className='radio-opt'+(p==='prov'?' on':'');

  document.getElementById('block-rep').style.display=p==='rep'?'':'none';
  document.getElementById('block-imp').style.display=p==='imp'?'':'none';
  document.getElementById('block-prov').style.display=p==='prov'?'':'none';
}

function openModal(id){
  editId=id||null;
  document.getElementById('modal-title').textContent=id?'EDIT COIN':'ADD COIN';
  ['f-ref','f-mint','f-mag','f-imp','f-auth','f-prov-auth','f-denom','f-date','f-desc','f-notes'].forEach(function(i){
    document.getElementById(i).value='';
  });
  document.getElementById('f-metal').value='';
  document.getElementById('f-prov').value=PROVS[0];
  setPeriod('rep');
  if(id){
    var c=coins.find(function(x){return x.id===id;});
    if(c){
      setPeriod(c.period);
      ['ref','mint','mag','imp','auth','authProv','metal','denom','date','desc','notes'].forEach(function(k){
        var el=document.getElementById('f-'+k);
        if(el)el.value=c[k]||'';
      });
      document.getElementById('f-prov').value=c.prov||PROVS[0];
    }
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  editId=null;
}

function saveCoin(){
  var prov=document.getElementById('f-prov').value;
  if(!prov){document.getElementById('f-prov').focus();return;}
  var coin={
    id: editId||nextId++,
    period: currentPeriod,
    ref: document.getElementById('f-ref').value.trim(),
    prov: prov,
    mint: document.getElementById('f-mint').value.trim(),
    mag: document.getElementById('f-mag').value.trim(),
    imp: document.getElementById('f-imp').value.trim(),
    auth: document.getElementById('f-auth').value.trim(),
    metal: document.getElementById('f-metal').value,
    denom: document.getElementById('f-denom').value.trim(),
    date: document.getElementById('f-date').value.trim(),
    desc: document.getElementById('f-desc').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    authProv: document.getElementById('f-prov-auth').value.trim(),
  };
  if(editId){
    var idx=coins.findIndex(function(x){return x.id===editId;});
    if(idx>=0)coins[idx]=coin;
  } else {
    coins.push(coin);
  }
  save();closeModal();renderList();updateMap();updateHeaderCount();
}

function askDelete(id,e){
  e.stopPropagation();deleteId=id;
  document.getElementById('confirm').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm').classList.remove('open');deleteId=null;}
function doDelete(){
  coins=coins.filter(function(c){return c.id!==deleteId;});
  save();closeConfirm();renderList();updateMap();updateHeaderCount();
}

function setFilter(f,el){
  filterMode=f;
  document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  renderList();
}

function renderList(){
  var q=document.getElementById('srch').value.toLowerCase();
  var filtered=coins.filter(function(c){
    if(filterMode==='rep'&&c.period!=='rep')return false;
    if(filterMode==='imp'&&c.period!=='imp')return false;
    if(filterMode==='prov'&&c.period!=='prov')return false;
    if(!q)return true;
    return (c.ref+c.prov+c.desc+c.mag+c.imp+c.denom+c.mint).toLowerCase().indexOf(q)>=0;
  });
  var el=document.getElementById('clist');
  el.innerHTML='';
  if(!filtered.length){
    el.innerHTML='<div class="empty-msg">No coins'+(q?' found':'')+'.</div>';
    document.getElementById('fcount').textContent='0';
    return;
  }
  filtered.forEach(function(c){
    var d=document.createElement('div');
    d.className='crow';
    
    var who =
      c.period === 'rep' ? c.mag :
      c.period === 'imp' ? (c.imp || c.auth || '') :
      c.period === 'prov' ? (c.auth || c.imp || '') :
      '';
    
    var periodClass =
      c.period === 'rep' ? 'ct-rep' :
      c.period === 'imp' ? 'ct-imp' :
      'ct-prov';
    
    var periodLabel =
      c.period === 'rep' ? 'REP' :
      c.period === 'imp' ? 'IMP' :
      'PROV';
    
    var tags = '<span class="ctag ' + periodClass + '">' + periodLabel + '</span>';
    
    if(c.metal)tags+='<span class="ctag ct-mat">'+c.metal.split(' ')[0]+'</span>';
    if(c.denom)tags+='<span class="ctag ct-mat">'+c.denom+'</span>';
    if(c.prov){
      var p = c.prov.replace('Italia — ','');
      tags += '<span class="ctag ct-prov-name">'+p+'</span>';
    }
    var refLine=c.ref||'(no reference)';
    d.innerHTML=
      '<div style="display:flex;align-items:flex-start;gap:4px">'+
      '<div style="flex:1;min-width:0">'+
        '<div class="crow-ref">'+refLine+'</div>'+
        (who?'<div class="crow-desc">'+who+'</div>':'')+
        (c.desc?'<div class="crow-desc" style="font-style:italic">'+c.desc+'</div>':'')+
        '<div class="crow-meta">'+tags+'</div>'+
      '</div>'+
      '<div class="crow-actions">'+
        '<button class="ca" title="Edit" onclick="openModal('+c.id+')">&#9998;</button>'+
        '<button class="ca del" title="Delete" onclick="askDelete('+c.id+',event)">&#x2715;</button>'+
      '</div>'+
      '</div>';
    el.appendChild(d);
  });
  document.getElementById('fcount').textContent=filtered.length;
}

function updateHeaderCount(){
  document.getElementById('hc').textContent=coins.length;
}

renderList();
updateHeaderCount();
</script>
</body>
</html>
